<!DOCTYPE html>
<html>

<head>
    <title>extra</title>
    <style>
        .img {
            float: left;
        }

        .clear {
            clear: both;
        }

        .container {
            display: flex;
            flex-direction: row;
        }

        .content {
            justify-content: center;
        }

        .content2 {
            align-items: center;
        }
    </style>
</head>

<body>
    <label><strong>Float left:</strong></label>
    <div class="img">
        <p>Explanation:</p>
        <p>Moves element to left.</p>
    </div>
    <label><strong>clear both</strong></label>
    <div class="clear">
        <p>Explanation:
        </p>
        <p>stops wrapping.</p>
    </div>
    <label><strong>Flex Direction</strong></label>
    <div class="container">
        <p>Explanation:</p>
        <p>controls row or column layout.</p>
    </div>
    <strong>Justify content:</strong>
    <div class="content">
        <p>Explanation:</p>
        <p>Aligns items horizontally.</p>
    </div>
    <strong>Align items:</strong>
    <div class="content2">
        <p>Explanation:</p>
        <p>Aligns items vertically.</p>
</body>

</html>
